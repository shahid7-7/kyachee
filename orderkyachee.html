<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/vC8zXkYv/8bdef540-3dd4-4e14-a286-50fda186c916.jpg">
    <title>Order Now | Kyachee Snaxx Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ffcc00;
            --accent: #d32f2f;
            --dark: #1a1a1a;
            --bg: #f8f9fa;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--dark);
        }

        /* --- Header --- */
        header { 
            background: var(--primary); 
            padding: 40px 20px; 
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
        }
        
        header h1 { 
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem; 
            margin: 0; 
            text-transform: uppercase;
        }
        header h2 {
            margin: -10px 0 10px 0;
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: 400;
        }
        header p { font-style: italic; font-weight: 600; opacity: 0.8; }

        /* --- Navigation --- */
        nav { display: flex; justify-content: center; background: var(--dark); }
        nav a { color: white; padding: 15px 25px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        nav a:hover { color: var(--primary); }

        /* --- Order Form Container --- */
        .order-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .order-container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Montserrat', sans-serif;
            color: var(--dark);
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            background: #fffdf5;
        }

        button {
            background: var(--dark);
            color: var(--primary);
            padding: 15px;
            border: none;
            width: 100%;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            padding: 30px;
            background: var(--dark);
            color: #666;
            font-size: 0.8rem;
            margin-top: 50px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .order-container { margin: 20px; padding: 25px; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>

<body>

<header>
    <h1>Kyachee</h1>
    <h2>snaxx</h2>   
    <p>"Fun to say, better to eat"</p>

</header>

<nav>
    <a href="index.html">Home</a>
    <a href="index.html#products">Our Snacks</a>
    <a href="index.html#contact">Contact</a>
</nav>

<div class="order-container">
    <h2>Secure Checkout</h2>

    <form id="orderForm" action="https://sheetdb.io/api/v1/be9xtu4xsctpk" method="POST">
        
        <label>Full Name</label>
        <input type="text" name="data[Name]" placeholder="Your Name" required>

        <label>Phone Number</label>
        <input type="text" name="data[Phone]" placeholder="Contact Number" required>

        <label>Delivery Address</label>
        <textarea name="data[Address]" rows="3" placeholder="Flat No, Street, Landmark, Pin" required></textarea>

        <label>Select Your Snack</label>
        <select name="data[Product]" required>
            <option value="">-- Choose Premium Snack --</option>
            <option value="Banana Chips">Golden Banana Chips (₹150/kg)</option>
            <option value="Murukku">Traditional Murukku (₹150/kg)</option>
            <option value="Joystick">Spicy Joystick (₹150/kg)</option>
            <option value="Tapioca Chips">Tapioca Chips (₹150/kg)</option>
            <option value="Cheese Balls">Cheese Balls (₹150/kg)</option>
        </select>

        <label>Quantity (Kilograms)</label>
        <input type="number" name="data[Quantity]" value="1" min="1" required>

        <button type="submit">Confirm Your Order</button>

    </form>
</div>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e){
    e.preventDefault();
    const btn = this.querySelector("button");
    btn.innerHTML = "Processing...";
    btn.disabled = true;

    fetch(this.action, {
        method: "POST",
        body: new FormData(this)
    })
    .then(res => res.json())
    .then(data => {
        window.location.href = "thanks.html";
    })
    .catch(err => {
        alert("Submission Failed ❌ Please try again.");
        btn.innerHTML = "Confirm Your Order";
        btn.disabled = false;
        console.log(err);
    });
});
</script>

<footer>
    &copy; 2026 Kyachee Snaxx International. Premium Quality Kerala Snacks.
</footer>

</body>
</html>
