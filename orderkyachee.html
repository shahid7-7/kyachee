<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" type="image/jpeg" href="https://i.ibb.co/vC8zXkYv/8bdef540-3dd4-4e14-a286-50fda186c916.jpg">
    <link rel="apple-touch-icon" href="https://i.ibb.co/vC8zXkYv/8bdef540-3dd4-4e14-a286-50fda186c916.jpg">

    <title>Order Now | Kyachee Snaxx</title>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f9f9f9; }
        header { background: #ffcc00; padding: 20px; text-align: center; }
        
        header h1 { 
            font-size: 3.5em; 
            margin: 0; 
            letter-spacing: -1px;
            font-family: 'Times New Roman', Times, serif;
        }
        header h2 {
            margin: 0; margin-left: 5.5em; color: red; font-size: xx-large;
        }
          header p { 
            margin-top: 10px; 
            font-style: italic; 
            font-weight: bold;
        }

        nav { display: flex; justify-content: center; background: #333; }
        nav a { color: white; padding: 14px 20px; text-decoration: none; }
        nav a:hover { background: #ffcc00; color: black; }

        .order-container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: red;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: #777;
        }
    </style>
</head>

<body>

<header>
    <h1>Kyachee</h1>
    <h2>snaxx</h2>
     <p>"Fun to say, better to eat"</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="index.html#contact">Contact</a>
</nav>

<div class="order-container">
    <h2>Place Your Order</h2>

    <!-- ✅ FIXED FORM -->
    <form id="orderForm" action="https://sheetdb.io/api/v1/be9xtu4xsctpk" method="POST">

        <input type="text" name="data[Name]" placeholder="Enter Name" required>

        <input type="text" name="data[Phone]" placeholder="Enter Phone" required>

        <textarea name="data[Address]" placeholder="Enter Address" required></textarea>

        <select name="data[Product]" required>
            <option value="">-- Choose a Snack --</option>
            <option value="Joystick">Joystick (₹150/kg)</option>
            <option value="Lays Murukku">Lays Murukku (₹150/kg)</option>
            <option value="Chips">Chips (₹150/kg)</option>
            <option value="Murukku">Murukku (₹150/kg)</option>
            <option value="Cheese Ball">Cheese Ball (₹150/kg)</option>
        </select>

        <input type="number" name="data[Quantity]" placeholder="Quantity (Kg)" min="1">

        <button type="submit">Confirm Order</button>

    </form>
</div>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e){
    e.preventDefault();

    fetch(this.action, {
        method: "POST",
        body: new FormData(this)
    })
    .then(res => res.json())
    .then(data => {
        
        window.location.href = "thanks.html";
    })
    .catch(err => {
        alert("Submission Failed ❌");
        console.log(err);
    });
});
</script>

<footer>
    &copy; 2026 Kyachee Pvt. Ltd. All Rights Reserved.
</footer>

</body>
</html>
