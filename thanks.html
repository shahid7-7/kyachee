<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffcc00, #ff5722);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.container {
  text-align: center;
  background: rgba(0,0,0,0.2);
  padding: 40px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

p {
  font-size: 18px;
  margin-bottom: 20px;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff5722;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #ffe0b2;
}

/* animation */
.checkmark {
  font-size: 60px;
  animation: pop 0.6s ease;
}

@keyframes pop {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}
</style>

</head>

<body>

<div class="container">
  <div class="checkmark">✅</div>
  <h1>Order Successful!</h1>
  <p>Thank you for ordering from Kyachee Snaxx 🍟</p>
  <p>Your order is being prepared ❤️</p>

  <button onclick="goHome()">Back to Home</button>
</div>

<script>
function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
