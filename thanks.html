<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | Kyachee Snaxx Premium</title>
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/vC8zXkYv/8bdef540-3dd4-4e14-a286-50fda186c916.jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ffcc00;
            --dark: #1a1a1a;
            --accent: #27ae60; /* Success Green */
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animated Background Gradients */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            border-radius: 50%;
            opacity: 0.2;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 60px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .icon-box {
            width: 100px;
            height: 100px;
            background: var(--accent);
            color: white;
            font-size: 50px;
            line-height: 100px;
            border-radius: 50%;
            margin: 0 auto 30px;
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.3);
            animation: scaleUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes scaleUp {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            color: #ccc;
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-home {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            background: var(--primary);
            color: var(--dark);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 204, 0, 0.3);
            background: white;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--primary);
            top: -10px;
            border-radius: 2px;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>

<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="icon-box">✓</div>
        <h1>Order Confirmed!</h1>
        <p>Thank you for choosing Kyachee Snaxx. We've received your order and started preparing your fresh snacks! 🍟</p>
        
        <a href="index.html" class="btn-home">Back to Store</a>
    </div>

    <script>
        // ലളിതമായ ഒരു കോൺഫെറ്റി ഇഫക്റ്റ് (ഓപ്ഷണൽ)
        function createConfetti() {
            for(let i=0; i<30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.backgroundColor = ['#ffcc00', '#ffffff', '#ff5722'][Math.floor(Math.random()*3)];
                document.body.appendChild(confetti);
            }
        }
        createConfetti();
    </script>

</body>
</html>
