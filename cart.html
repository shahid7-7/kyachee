<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Kyachee Snaxx</title>

<style>
:root {
    --primary:#ffcc00;
    --dark:#1a1a1a;
    --light:#f4f4f4;
}

body {
    font-family: 'Poppins', sans-serif;
    margin:0;
    background:var(--light);
}

/* Header */
header {
    background:var(--primary);
    padding:25px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* Back Button (side) */
.back-btn {
    position:absolute;
    left:20px;
    top:20px;
    padding:10px 18px;
    background:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* Title */
h2 {
    text-align:center;
    margin-top:30px;
    color:#333;
}

/* Table Card */
.table-container {
    width:95%;
    max-width:900px;
    margin:30px auto;
    background:#fff;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    overflow-x:auto;
}

table {
    width:100%;
    border-collapse:collapse;
    min-width: 400px;
}

th {
    background:#fafafa;
    font-weight:600;
}

th,td {
    padding:15px;
    text-align:center;
    border-bottom:1px solid #eee;
}

/* Qty Controls */
.qty-btn {
    background: #eee;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 4px;
    font-size: 16px;
}

.qty-val {
    margin: 0 10px;
    font-weight: 600;
}

/* Remove button */
td button.remove-btn {
    background:#ff4d4d;
    color:#fff;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

/* Total */
.total {
    text-align:center;
    font-size:22px;
    margin:20px;
    font-weight:600;
}

/* Order Button */
.btn {
    display:block;
    margin:30px auto;
    padding:15px 35px;
    background:var(--primary);
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover {
    background:#ffd633;
}

/* Mobile Adjustments */
@media (max-width: 600px) {
    header { font-size: 26px; padding: 35px; }
    th, td { padding: 10px; font-size: 18px; }
    .qty-btn { padding: 8px 14px; font-size: 20px; }
    .total { font-size: 26px; }
    .btn { width: 80%; font-size: 20px; }
    .back-btn { top: 10px; left: 10px; padding: 8px 12px; }
}
</style>
</head>

<body>

<header>
Kyachee Snaxx Cart 🛒
</header>

<button onclick="goBack()" class="back-btn">⬅ Back</button>

<h2>Your Items</h2>

<div class="table-container">
<table id="cartTable">
<thead>
    <tr>
    <th>Product</th>
    <th>Price</th>
    <th>Qty</th>
    <th>Total</th>
    <th>Remove</th>
    </tr>
</thead>
<tbody id="cartBody">
</tbody>
</table>
</div>

<div class="total" id="grandTotal"></div>

<button class="btn" onclick="goToOrder()">Place Order</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCart(){
    let tableBody = document.getElementById("cartBody");
    tableBody.innerHTML = "";
    let total = 0;

    cart.forEach((item,index)=>{
        let row = tableBody.insertRow();
        row.innerHTML = `
        <td>${item.name}</td>
        <td>₹${item.price}</td>
        <td>
            <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
        </td>
        <td>₹${item.price * item.qty}</td>
        <td><button class="remove-btn" onclick="removeItem(${index})">X</button></td>
        `;
        total += item.price * item.qty;
    });

    document.getElementById("grandTotal").innerText = "Total: ₹" + total;
}

function updateQty(index, change) {
    if (cart[index].qty + change > 0) {
        cart[index].qty += change;
        saveAndReload();
    }
}

function removeItem(i){
    cart.splice(i,1);
    saveAndReload();
}

function saveAndReload() {
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function goToOrder(){
    window.location.href = "orderkyachee.html";
}

function goBack(){
    window.history.back();
}

loadCart();
</script>

</body>
</html>
