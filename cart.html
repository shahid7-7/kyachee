<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Kyachee Snaxx</title>
<style>
:root { --primary:#ffcc00; --dark:#1a1a1a; --light:#f4f4f4; }
body { font-family: 'Poppins', sans-serif; margin:0; background:var(--light); }
header { background:var(--primary); padding:25px; text-align:center; font-size:22px; font-weight:bold; }

.back-btn {
    position: absolute;
    top: 85px;
    left: 15px;
    background: var(--dark);
    color: var(--primary);
    border: none;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.back-btn:hover { background: #ff4d4d; color: white; }
.back-btn:active { transform: scale(0.95); }

h2 { text-align: center; margin-top: 60px; color: #333; }

.table-container { 
    width:95%; 
    max-width:900px; 
    margin:20px auto; 
    background:#fff; 
    border-radius:12px; 
    box-shadow:0 5px 20px rgba(0,0,0,0.08); 
    overflow-x:auto; 
}

table { width:100%; border-collapse:collapse; min-width: 400px; }
th, td { padding:15px; text-align:center; border-bottom:1px solid #eee; }
th { background: #f9f9f9; font-weight: 600; color: #555; }

.product-cell { display: flex; align-items: center; gap: 12px; text-align: left; }
.cart-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
.qty-btn { background: #eee; border: none; width: 30px; height: 30px; cursor: pointer; border-radius: 50%; font-weight: bold; }
.qty-val { margin: 0 10px; font-weight: 600; }
.remove-btn { background:#ff4d4d; color:#fff; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; }

.total-section { text-align:center; font-size:24px; margin:20px; font-weight:700; color: var(--dark); }
.btn { display:block; margin:20px auto 50px; padding:15px 40px; background:var(--primary); border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-size: 16px; transition:0.3s; }
.btn:hover { background: #e6b800; transform: translateY(-2px); }

@media (max-width: 600px) { 
    header { font-size: 20px; padding: 20px; } 
    .btn { width: 90%; }
}
</style>
</head>
<body>

<header>Kyachee Snaxx Cart 🛒</header>

<button onclick="goBack()" class="back-btn">⬅ Back</button>

<h2>Your Items</h2>

<div class="table-container">
<table id="cartTable">
<thead>
    <tr>
    <th style="text-align: left; padding-left: 25px;">Product</th>
    <th>Price</th>
    <th>Qty</th>
    <th>Remove</th>
    </tr>
</thead>
<tbody id="cartBody"></tbody>
</table>
</div>

<div class="total-section" id="grandTotal">Total: ₹0</div>
<button class="btn" onclick="goToOrder()">Place Order Now</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCart(){
    let tableBody = document.getElementById("cartBody");
    tableBody.innerHTML = "";
    let total = 0;

    if(cart.length === 0) {
        tableBody.innerHTML = "<tr><td colspan='4' style='padding:30px; color:#888;'>Your cart is empty!</td></tr>";
        document.getElementById("grandTotal").innerText = "Total: ₹0";
        return;
    }

    cart.forEach((item, index) => {
        let row = tableBody.insertRow();
        row.innerHTML = `
        <td>
            <div class="product-cell">
                <img src="${item.img}" class="cart-img">
                <span>${item.name}</span>
            </div>
        </td>
        <td>₹${item.price}</td>
        <td>
            <div style="display:flex;align-items:center;justify-content:center;">
                <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                <span class="qty-val">${item.qty}</span>
                <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
            </div>
        </td>
        <td>
            <button class="remove-btn" onclick="removeItem(${index})">✕</button>
        </td>
        `;
        total += item.price * item.qty;
    });

    document.getElementById("grandTotal").innerText = "Total: ₹" + total;
}

function updateQty(index, change) {
    if (cart[index].qty + change > 0) {
        cart[index].qty += change;
        saveAndReload();
    }
}

function removeItem(index){
    if(confirm("Remove this item?")) {
        cart.splice(index, 1);
        saveAndReload();
    }
}

function saveAndReload() {
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function goToOrder(){
    if(cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }
    let summary = cart.map(item => `${item.name} (${item.qty}kg)`).join(", ");
    let totalAmount = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

    localStorage.setItem("fullOrderSummary", summary);
    localStorage.setItem("totalOrderAmount", totalAmount);
    window.location.href = "orderkyachee.html";
}

function goBack(){
    window.history.back();
}

loadCart();
</script>
</body>
</html>
