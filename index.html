    <style>
        :root {

            --secondary-color: #d32f2f;
            --dark-color: #1a1a1a;
            --white: #ffffff;
            --light-grey: #f4f4f4;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0;  
            color: var(--dark-color);
            background-color: var(--white);
            line-height: 1.6;
        }

        header { 
            background: var(--primary-color); 
            padding: 50px 20px; 
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0% 100%);
        }

        header h1 { 
            font-size: 4.5rem;
            margin: 0; 
            text-transform: uppercase;
            font-weight: 700;
        }

        header h2 {
            margin: -15px 0 10px 0;
            color: var(--secondary-color);
            font-size: 2rem;
            text-transform: lowercase;
        }

        nav { 
            display: flex; 
            justify-content: center; 
            background: var(--dark-color); 
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a { 
            color: white; 
            padding: 15px 25px; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: 0.85rem;
            font-weight: 600;
        }

        .products { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        
        .product-container { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card { 
            border: 1px solid #eee;
            border-radius: 12px; 
            padding: 15px; 
            background: #fff;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .product-img {
            width: 100%;
            height: 320px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .product-img img { width: 100%; height: 100%; object-fit: cover; }

        .qty-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
        }

        .qty-btn {
            background: #eee;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .order-btn { 
            background: var(--primary-color); 
            color: var(--dark-color); 
            padding: 12px 25px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 5px; 
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .contact-section { 
            background: var(--dark-color); 
            color: white; 
            padding: 60px 20px; 
            text-align: center; 
        }

        @media (max-width: 600px) {
            header h1 { font-size: 3rem; }
            .product-container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .product-img { height: 180px; }
        }
    </style>
</head>

    <script>
        // താൽക്കാലികമായി ഓരോ പ്രൊഡക്റ്റിന്റെയും ക്വാണ്ടിറ്റി സൂക്ഷിക്കാൻ
        let itemQuantities = {};

        function changeQty(id, change) {
            if (!itemQuantities[id]) itemQuantities[id] = 1;
            
            itemQuantities[id] += change;
            
            if (itemQuantities[id] < 1) itemQuantities[id] = 1;
            
            document.getElementById('qty-' + id).innerText = itemQuantities[id];
        }

        function addToCart(name, price, id) {
            // Cart ഡാറ്റ LocalStorage-ൽ നിന്ന് എടുക്കുന്നു
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            
            // സ്പാനിൽ നിന്നുള്ള കറന്റ് ക്വാണ്ടിറ്റി എടുക്കുന്നു
            let qty = parseInt(document.getElementById('qty-' + (id || name)).innerText);

            let existingItem = cart.find(p => p.name === name);

            if (existingItem) {
                existingItem.qty += qty;
            } else {
                cart.push({ name, price, qty });
            }

            // തിരികെ LocalStorage-ലേക്ക് സേവ് ചെയ്യുന്നു
            localStorage.setItem("cart", JSON.stringify(cart));

            alert(qty + " kg " + name + " added to cart!");
            
            // ആഡ് ചെയ്ത ശേഷം ക്വാണ്ടിറ്റി 1 ലേക്ക് റീസെറ്റ് ചെയ്യുന്നു
            document.getElementById('qty-' + (id || name)).innerText = 1;
            itemQuantities[id || name] = 1;
        }
    </script>
